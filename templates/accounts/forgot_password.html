{% extends 'base.html' %}{% block title %}Forgot Password — ManVault{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:460px">
  <div class="mv-card p-4 p-md-5">
    <div class="text-center mb-4">
      <div style="font-size:48px;margin-bottom:12px">🔑</div>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700">Forgot Password?</h1>
      <p style="color:var(--tx3);font-size:13px;margin-top:6px">Enter your email and we'll send an OTP to reset your password.</p>
    </div>
    <form method="POST">
      {% csrf_token %}
      <div class="mb-4"><label style="font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px">Email Address</label>
      <input type="email" name="email" placeholder="your@email.com" class="mv-input" required autofocus></div>
      <button type="submit" class="mv-btn w-100 justify-content-center" style="padding:14px">Send OTP</button>
    </form>
    <div class="text-center mt-4" style="font-size:13px"><a href="{% url 'accounts:login' %}" style="color:var(--tx3)">← Back to Sign In</a></div>
  </div>
</div>
{% endblock %}
