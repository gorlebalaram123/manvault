{% extends 'base.html' %}{% block title %}Reset Password — ManVault{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:460px">
  <div class="mv-card p-4 p-md-5">
    <div class="text-center mb-4"><div style="font-size:48px;margin-bottom:12px">🔒</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700">Reset Password</h1>
    <p style="color:var(--tx3);font-size:13px">Enter the OTP from your email and your new password.</p></div>
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3"><label style="font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px">OTP</label><input type="text" name="otp" maxlength="6" placeholder="6-digit OTP" class="mv-input" style="letter-spacing:6px;text-align:center;font-weight:800" required></div>
      <div class="mb-4"><label style="font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px">New Password</label><input type="password" name="new_password" placeholder="New password (min 8 chars)" class="mv-input" minlength="8" required></div>
      <button type="submit" class="mv-btn w-100 justify-content-center" style="padding:14px">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
